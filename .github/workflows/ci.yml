name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install ruff
      - name: Lint with ruff
        run: |
          ruff check .
      - name: Format check
        run: |
          ruff format --check .
      - name: Smoke test
        run: |
          python3 -c "import sys; sys.path.insert(0, '.'); from pentefino.platforms import list_platforms; print('platforms:', [p['name'] for p in list_platforms()])"
