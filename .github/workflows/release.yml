name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0)"
        required: true

jobs:
  changelog:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Generate changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --strip header
        env:
          OUTPUT: CHANGELOG.md
      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: pentefino-changelog
          path: CHANGELOG.md

  build:
    needs: changelog
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        include:
          - os: ubuntu-latest
            suffix: linux-x64
          - os: macos-latest
            suffix: macos-x64
          - os: windows-latest
            suffix: win-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller
      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile \
            --name "pentefino-${{ matrix.suffix }}" \
            --collect-all pentefino \
            pentefino.py
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: pentefino-binary-${{ matrix.suffix }}
          path: dist/pentefino-${{ matrix.suffix }}
          if-no-files-found: error

  release:
    needs: [changelog, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: pentefino-changelog
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: pentefino-binary-*
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            pentefino-linux-x64
            pentefino-macos-x64
            pentefino-win-x64.exe
          name: Release ${{ github.ref_name }}
